name: security

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
      - name: Install
        run: python -m pip install -e ".[dev]"
      - name: Lint security rules
        run: python -m ruff check --select S --ignore S603 src tests scripts
      - name: Scan repository text
        run: python scripts/security_scan.py
