name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          fetch-depth: 0
      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.13"
          cache: pip
      - name: Install build tools
        run: python -m pip install -e ".[dev]"
      - name: Test
        run: python -m pytest
      - name: Build package
        run: python -m build
      - name: Build zipapp
        run: python scripts/build_zipapp.py
      - name: Checksums
        run: python scripts/checksums.py dist/*.whl dist/*.tar.gz dist/shipreceipt.pyz
      - name: Publish release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release create "$GITHUB_REF_NAME" dist/*.whl dist/*.tar.gz dist/shipreceipt.pyz dist/checksums.txt --title "$GITHUB_REF_NAME" --notes-file "release-notes/$GITHUB_REF_NAME.md" --verify-tag
